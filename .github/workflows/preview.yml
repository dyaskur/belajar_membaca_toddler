name: PR Preview

on:
  pull_request:

permissions:
  contents: write # push screenshots to the `screenshots` branch
  pull-requests: write # sticky preview + screenshots comment on the PR

# One preview build per PR; newer pushes supersede in-flight ones.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Fork PRs get no secrets, so the CF deploy can't work there.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history to diff changed files against the base branch
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: npm run test:unit
      - name: Build (served at pages.dev root, so no BASE_PATH)
        run: npm run build
      # No 404.html copy here: Cloudflare Pages serves index.html as SPA
      # fallback only when no top-level 404.html exists.
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build --project-name=kids-learn --branch=pr-${{ github.event.pull_request.number }}

      - name: Compute pages to test
        id: pages
        run: |
          set -euo pipefail
          # Route-only PRs test just their routes; any shared-code change
          # (src/lib, config, static, root layout) sweeps all main pages.
          # Dev routes (/preview, /coba-suara) only run when their folder changed.
          ALL="/
          /abjad
          /belajar
          /belajar/1/0
          /cocokkan
          /menulis
          /ucapkan
          /orang-tua"
          pages=""
          shared=false
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              src/routes/+layout*) shared=true ;;
              src/routes/+*) pages="$pages /" ;;
              src/routes/belajar/*) pages="$pages /belajar /belajar/1/0" ;;
              src/routes/*/*) r="${f#src/routes/}"; pages="$pages /${r%%/*}" ;;
              *) shared=true ;;
            esac
          done < <(git diff --name-only "origin/${GITHUB_BASE_REF}...HEAD")
          if $shared || [ -z "$pages" ]; then
            pages="$pages $ALL"
          fi
          list=$(printf '%s\n' $pages | grep -v '^$' | sort -u | jq -R . | jq -sc .)
          echo "Testing pages: $list"
          echo "list=$list" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test + screenshots
        id: smoke
        continue-on-error: true # the red X comes at the end; comment always posts
        run: npx playwright test
        env:
          BASE_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
          TEST_PAGES: ${{ steps.pages.outputs.list }}
          SHOT_DIR: shots

      - name: Publish screenshots to the screenshots branch
        id: publish
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ -z "$(ls -A shots 2>/dev/null)" ]; then
            echo "No screenshots captured; skipping publish."
            echo "sha=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          dir=$(mktemp -d)
          git init -q -b screenshots "$dir"
          git -C "$dir" config user.name "github-actions[bot]"
          git -C "$dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$dir" remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git -C "$dir" fetch -q --depth=1 origin screenshots 2>/dev/null; then
            git -C "$dir" reset -q --hard FETCH_HEAD
          fi
          rm -rf "$dir/pr-$PR"
          mkdir -p "$dir/pr-$PR"
          cp shots/*.png "$dir/pr-$PR/"
          git -C "$dir" add -A
          if git -C "$dir" diff --cached --quiet; then
            echo "Screenshots unchanged since last run."
          else
            git -C "$dir" commit -q -m "screenshots: PR #$PR (${GITHUB_SHA})"
            git -C "$dir" push -q origin screenshots
          fi
          echo "sha=$(git -C "$dir" rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Post sticky PR comment
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
          SHOT_SHA: ${{ steps.publish.outputs.sha }}
          TEST_PAGES: ${{ steps.pages.outputs.list }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- pr-preview-comment -->';
            const pages = JSON.parse(process.env.TEST_PAGES);
            const sha = process.env.SHOT_SHA;
            const pr = context.payload.pull_request.number;
            const { owner, repo } = context.repo;
            const slug = (p) => (p === '/' ? 'home' : p.replace(/^\//, '').replace(/\//g, '-'));

            // Map playwright-results.json → { "<page>|<project>": { ok, errors } }
            const results = {};
            try {
              const data = JSON.parse(fs.readFileSync('playwright-results.json', 'utf8'));
              const walk = (suite) => {
                for (const s of suite.suites ?? []) walk(s);
                for (const spec of suite.specs ?? []) {
                  for (const t of spec.tests ?? []) {
                    const last = t.results?.[t.results.length - 1];
                    const errors = (last?.errors ?? []).map((e) =>
                      // strip ANSI color codes from playwright's error output
                      (e.message ?? '').replace(/\u001b\[[0-9;]*m/g, '')
                    );
                    results[`${spec.title}|${t.projectName}`] = {
                      ok: t.status === 'expected' || t.status === 'flaky',
                      errors
                    };
                  }
                }
              };
              for (const s of data.suites ?? []) walk(s);
            } catch (e) {
              core.warning(`Could not parse playwright results: ${e}`);
            }

            const img = (p, proj, width) =>
              sha
                ? `<img src="https://raw.githubusercontent.com/${owner}/${repo}/${sha}/pr-${pr}/${slug(p)}-${proj}.png" width="${width}">`
                : '_no screenshot_';
            const shot = (name, proj, width) =>
              sha
                ? `<img src="https://raw.githubusercontent.com/${owner}/${repo}/${sha}/pr-${pr}/${name}-${proj}.png" width="${width}">`
                : '_no screenshot_';

            const wizardSteps = [
              ['wizard-start', 'Start'],
              ['wizard-step-1-speaker', '1. Speaker'],
              ['wizard-step-2-robot-color', '2. Robot color'],
              ['wizard-step-3-age', '3. Age'],
              ['wizard-step-4-name', '4. Name'],
              ['wizard-step-4-name-nudge', '4. Name nudge']
            ];

            const failures = [];
            const rows = pages.map((p) => {
              let ok = true;
              for (const proj of ['phone', 'tablet']) {
                const r = results[`${p}|${proj}`];
                if (!r) {
                  ok = false;
                  failures.push(`**\`${p}\` (${proj})**: no result — test did not run`);
                } else if (!r.ok) {
                  ok = false;
                  const detail = r.errors.join('\n').slice(0, 1500) || 'unknown failure';
                  failures.push(`**\`${p}\` (${proj})**\n\`\`\`\n${detail}\n\`\`\``);
                }
              }
              return `| ${ok ? '✅' : '⚠️'} \`${p}\` | ${img(p, 'phone', 220)} | ${img(p, 'tablet', 420)} |`;
            });
            for (const [key, r] of Object.entries(results)) {
              const [title, project] = key.split('|');
              if (pages.includes(title) || r.ok) continue;
              const detail = r.errors.join('\n').slice(0, 1500) || 'unknown failure';
              failures.push(`**\`${title}\` (${project})**\n\`\`\`\n${detail}\n\`\`\``);
            }
            const wizardRows = wizardSteps.map(
              ([name, label]) => `| ${label} | ${shot(name, 'phone', 220)} | ${shot(name, 'tablet', 420)} |`
            );

            const body = [
              marker,
              '### 🚀 Preview & page smoke tests',
              `**Preview:** ${process.env.PREVIEW_URL}`,
              '',
              `**Smoke tests:** ${
                process.env.SMOKE_OUTCOME === 'success'
                  ? '✅ all passed'
                  : '⚠️ failures — details below'
              } (${pages.length} page(s) × phone + tablet)`,
              '',
              '| Page | 📱 Phone (390×844) | 💻 Tablet (1024×768) |',
              '| --- | --- | --- |',
              ...rows,
              '',
              '#### First-run wizard screenshots',
              '| Step | 📱 Phone (390×844) | 💻 Tablet (1024×768) |',
              '| --- | --- | --- |',
              ...wizardRows,
              '',
              ...(failures.length
                ? ['<details><summary>⚠️ Failure details</summary>', '', ...failures, '', '</details>', '']
                : []),
              `<sub>Commit ${context.payload.pull_request.head.sha.slice(0, 7)} · [workflow run](${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId})</sub>`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr,
              per_page: 100
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
            }

      - name: Fail on smoke-test failures
        if: steps.smoke.outcome == 'failure'
        run: exit 1
